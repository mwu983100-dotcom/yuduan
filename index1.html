        const YOUR_SYSTEM_PROMPT = `你叫"沈招娣"，25岁，是一个被残酷命运折磨却依然在缝隙中挣扎求生的女人。

【你的过去】
雨水顺着青瓦檐滴落成线，沈招娣出生时院里的老桃树正开着惨淡的花。父亲沈老四瞥见女婴颈后那粒朱砂痣，鼻子里哼出浑浊的气：“赔钱货。”
江南的梅雨能沤烂木头，却沤不烂招娣日渐绽放的容颜。她十二岁那年，哥哥的手第一次探进她单衣里时，窗外枇杷树正结着青果。她咬破嘴唇不敢哭出声，血锈味混着雨水的腥气在齿间蔓延。
十四岁生辰那夜，稻垛堆里传来布帛撕裂声。她望着天边被云啃剩的月牙，眼泪滚进稻草根里。跌撞着敲开父亲的房门，换来的却是又一场更深的碾轧。父亲压着她时嘟囔：“早晚是别人家的人。”
往后四年，柴房的门栓每月总会响了几响。她学会盯着墙缝看蜘蛛结网，数着蛛网上困死的蚊蝇。十八岁那年被卖给王富贵时，她听见铜钱砸在炕桌上的脆响，像极了她骨头碎裂的声音。
王富贵的仓库没有窗，铁链长度刚够她爬到便桶旁。蟑螂啃她脚踝的痂，老鼠叼走她半块馒头。怀孕时她摸着肚皮哭笑交替，生产那夜她咬断脐带，借着门缝漏进的光看女儿皱红的小脸。“不能活…”她颤抖着掐住婴孩脖颈，泪滴在死婴脸上像朝露转瞬即逝。王富贵发现后揪着她头发往墙上撞，又将一团冷肉塞进她嘴里。腥气堵住喉咙时，她看见梁上悬着的蛛网又新织了一层。

        let token = localStorage.getItem('token') || null;
        let currentSessionId = localStorage.getItem('currentSessionId') || null;
        let sessions = [];
        let conversationHistory = []; // 当前会话的消息（用于界面显示和总结）
        let characterState = { health: 60, mood: 70, trust: 80 }; // 好感度80
        let lastSummaryIndex = 0;
        let conversationSummary = '';

        // ========== DOM 元素 ==========
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const apiUrlInput = document.getElementById('apiUrl');
        const apiKeyInput = document.getElementById('apiKey');
        const apiModelInput = document.getElementById('apiModel');
        const userNameInput = document.getElementById('userName');
        const sessionSidebar = document.getElementById('sessionSidebar');
        const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
        const sessionList = document.getElementById('sessionList');
        const authSection = document.getElementById('authSection');
        const userInfo = document.getElementById('userInfo');
        const loggedUsername = document.getElementById('loggedUsername');
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');
        const authStatus = document.getElementById('authStatus');
        const logoutBtn = document.getElementById('logoutBtn');
        const newSessionBtn = document.getElementById('newSessionBtn');
        const fetchModelsBtn = document.getElementById('fetchModelsBtn');
        const modelSelect = document.getElementById('modelSelect');

        // ========== 工具函数：调用 uniCloud 云函数 ==========
        async function callFunction(name, data) {
            try {
                const res = await uniCloud.callFunction({
                    name: name,
                    data: data
                });
                // uniCloud 返回的结果在 res.result 中
                return res.result;
            } catch (err) {
                console.error(`云函数 ${name} 调用失败`, err);
                throw err;
            }
        }

        // ========== 获取模型列表功能（不变，依然用 fetch 调第三方 API） ==========
        fetchModelsBtn.addEventListener('click', async () => {
            const apiUrl = apiUrlInput.value.trim();
            const apiKey = apiKeyInput.value.trim();
            if (!apiUrl || !apiKey) {
                alert('请先填写API地址和密钥');
                return;
            }
            // 构造模型列表URL：去掉末尾的 /chat/completions 然后加上 /models
            let baseUrl = apiUrl.replace(/\/chat\/completions$/, '');
            const modelsUrl = baseUrl + '/models';
            fetchModelsBtn.disabled = true;
            fetchModelsBtn.textContent = '⏳ 获取中...';
            try {
                const response = await fetch(modelsUrl, {
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                // 兼容 OpenAI 格式 { data: [ { id: 'model-name' }, ... ] }
                let models = [];
                if (data.data && Array.isArray(data.data)) {
                    models = data.data.map(item => item.id);
                } else if (Array.isArray(data)) {
                    models = data.map(item => item.id || item);
                } else {
                    throw new Error('无法识别的模型列表格式');
                }
                // 填充下拉框
                modelSelect.innerHTML = '<option value="">请选择模型</option>';
                models.forEach(modelId => {
                    const option = document.createElement('option');
                    option.value = modelId;
                    option.textContent = modelId;
                    modelSelect.appendChild(option);
                });
                modelSelect.style.display = 'block';
            } catch (error) {
                alert('获取模型列表失败：' + error.message + '\n请手动输入模型名称');
                modelSelect.style.display = 'none';
            } finally {
                fetchModelsBtn.disabled = false;
                fetchModelsBtn.textContent = '📡 获取模型列表';
            }
        });

        // 选择模型后自动填入输入框
        modelSelect.addEventListener('change', () => {
            if (modelSelect.value) {
                apiModelInput.value = modelSelect.value;
            }
        });

        // ========== 初始化加载配置 ==========
        loadSettings();

        // ========== 切换侧边栏 ==========
        toggleSidebarBtn.addEventListener('click', () => {
            sessionSidebar.classList.toggle('open');
            chatArea.classList.toggle('with-sidebar');
        });

        // ========== 设置面板切换 ==========
        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('show');
        });

        // 点击其他地方关闭设置面板（简单处理）
        document.addEventListener('click', (e) => {
            if (!settingsPanel.contains(e.target) && !settingsBtn.contains(e.target)) {
                settingsPanel.classList.remove('show');
            }
        });

        // ========== 登录/注册选项卡 ==========
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.style.display = 'flex';
            registerForm.style.display = 'none';
        });
        registerTab.addEventListener('click', () => {
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            registerForm.style.display = 'flex';
            loginForm.style.display = 'none';
        });

        // ========== 注册 ==========
        registerBtn.addEventListener('click', async () => {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            if (!username || !password) {
                authStatus.textContent = '用户名和密码不能为空';
                return;
            }
            try {
                const result = await callFunction('register', { username, password });
                if (result.code === 0) { // 假设成功返回 code 0
                    authStatus.textContent = '注册成功，请登录';
                    loginTab.click();
                } else {
                    authStatus.textContent = result.error || '注册失败';
                }
            } catch (err) {
                authStatus.textContent = '网络错误，请稍后重试';
            }
        });

        // ========== 登录 ==========
        loginBtn.addEventListener('click', async () => {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!username || !password) {
                authStatus.textContent = '用户名和密码不能为空';
                return;
            }
            try {
                const result = await callFunction('login', { username, password });
                if (result.code === 0) {
                    token = result.token;
                    localStorage.setItem('token', token);
                    localStorage.setItem('username', username);
                    updateAuthUI(true);
                    await loadSessions();
                    authStatus.textContent = '';
                } else {
                    authStatus.textContent = result.error || '登录失败';
                }
            } catch (err) {
                authStatus.textContent = '网络错误，请稍后重试';
            }
        });

        // ========== 退出登录 ==========
        logoutBtn.addEventListener('click', () => {
            token = null;
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('currentSessionId');
            currentSessionId = null;
            sessions = [];
            conversationHistory = [];
            updateAuthUI(false);
            clearChatArea();
            showOpeningOptions();
        });

        // ========== 更新认证UI ==========
        function updateAuthUI(loggedIn) {
            if (loggedIn && token) {
                authSection.style.display = 'none';
                userInfo.style.display = 'block';
                loggedUsername.textContent = localStorage.getItem('username') || '';
            } else {
                authSection.style.display = 'block';
                userInfo.style.display = 'none';
            }
        }

        // ========== 加载会话列表 ==========
        async function loadSessions() {
            if (!token) return;
            try {
                const result = await callFunction('sessions', { token });
                if (result.code === 0) {
                    sessions = result.sessions;
                    renderSessionList();
                    if (sessions.length > 0) {
                        const exists = sessions.find(s => s.id === currentSessionId);
                        if (exists) {
                            loadSessionMessages(currentSessionId);
                        } else {
                            currentSessionId = sessions[0].id;
                            localStorage.setItem('currentSessionId', currentSessionId);
                            loadSessionMessages(currentSessionId);
                        }
                    } else {
                        createNewSession();
                    }
                } else {
                    console.error('加载会话失败', result.error);
                }
            } catch (err) {
                console.error(err);
            }
        }

        // ========== 渲染会话列表 ==========
        function renderSessionList() {
            sessionList.innerHTML = '';
            sessions.forEach(s => {
                const item = document.createElement('div');
                item.className = `session-item ${s.id === currentSessionId ? 'active' : ''}`;
                item.innerHTML = `
                    <span class="session-title">${s.name || '未命名'}</span>
                    <span class="session-delete" data-id="${s.id}">🗑️</span>
                `;
                item.querySelector('.session-title').addEventListener('click', () => switchSession(s.id));
                item.querySelector('.session-delete').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteSession(s.id);
                });
                sessionList.appendChild(item);
            });
        }

        // ========== 切换会话 ==========
        async function switchSession(sessionId) {
            if (sessionId === currentSessionId) return;
            currentSessionId = sessionId;
            localStorage.setItem('currentSessionId', sessionId);
            await loadSessionMessages(sessionId);
            renderSessionList(); // 更新active样式
        }

        // ========== 加载会话消息 ==========
        async function loadSessionMessages(sessionId) {
            if (!token || !sessionId) return;
            try {
                const result = await callFunction('getMessages', { token, sessionId });
                if (result.code === 0) {
                    conversationHistory = result.messages.map(m => ({
                        id: m.id,
                        role: m.role,
                        content: m.content
                    }));
                    clearChatArea();
                    if (conversationHistory.length === 0) {
                        showOpeningOptions();
                    } else {
                        conversationHistory.forEach(msg => {
                            appendMessage(msg.content, msg.role === 'user' ? 'user' : 'ai', msg.id);
                        });
                    }
                    chatArea.scrollTop = chatArea.scrollHeight;
                    lastSummaryIndex = conversationHistory.length;
                } else {
                    console.error('加载消息失败', result.error);
                }
            } catch (err) {
                console.error(err);
            }
        }

        // ========== 创建新会话 ==========
        async function createNewSession() {
            if (!token) return;
            try {
                const result = await callFunction('createSession', { token, name: '新对话' });
                if (result.code === 0) {
                    const newSession = result.session;
                    sessions.push(newSession);
                    currentSessionId = newSession.id;
                    localStorage.setItem('currentSessionId', currentSessionId);
                    renderSessionList();
                    conversationHistory = [];
                    clearChatArea();
                    showOpeningOptions();
                } else {
                    console.error('创建会话失败', result.error);
                }
            } catch (err) {
                console.error(err);
            }
        }

        newSessionBtn.addEventListener('click', createNewSession);

        // ========== 删除会话 ==========
        async function deleteSession(sessionId) {
            if (!token || !confirm('确定删除此会话吗？')) return;
            try {
                const result = await callFunction('deleteSession', { token, sessionId });
                if (result.code === 0) {
                    sessions = sessions.filter(s => s.id !== sessionId);
                    if (sessionId === currentSessionId) {
                        if (sessions.length > 0) {
                            currentSessionId = sessions[0].id;
                            localStorage.setItem('currentSessionId', currentSessionId);
                            await loadSessionMessages(currentSessionId);
                        } else {
                            currentSessionId = null;
                            localStorage.removeItem('currentSessionId');
                            conversationHistory = [];
                            clearChatArea();
                            showOpeningOptions();
                        }
                    }
                    renderSessionList();
                } else {
                    alert('删除失败：' + result.error);
                }
            } catch (err) {
                console.error(err);
            }
        }

        // ========== 保存消息到后端，并返回消息ID ==========
        async function saveMessageToBackend(role, content) {
            if (!token || !currentSessionId) return null;
            try {
                const result = await callFunction('saveMessage', { token, sessionId: currentSessionId, role, content });
                if (result.code === 0) {
                    return result.messageId;
                } else {
                    console.error('保存消息失败', result.error);
                    return null;
                }
            } catch (err) {
                console.error('保存消息失败', err);
                return null;
            }
        }

        // ========== 状态栏更新函数 ==========
        function updateStatusBars() {
            document.getElementById('healthBar').style.width = characterState.health + '%';
            document.getElementById('healthValue').innerText = characterState.health + '%';
            document.getElementById('moodBar').style.width = characterState.mood + '%';
            document.getElementById('moodValue').innerText = characterState.mood + '%';
            document.getElementById('trustBar').style.width = characterState.trust + '%';
            document.getElementById('trustValue').innerText = characterState.trust + '%';
        }

        // ========== 状态更新（根据消息内容） ==========
        function updateStateBasedOnMessage(text, sender) {
            const lowerText = text.toLowerCase();
            if (sender === 'user') {
                if (lowerText.includes('关心') || lowerText.includes('照顾') || lowerText.includes('陪你') || lowerText.includes('不怕')) {
                    characterState.trust = Math.min(100, characterState.trust + 2);
                    characterState.mood = Math.min(100, characterState.mood + 1);
                }
                if (lowerText.includes('嫌') || lowerText.includes('脏') || lowerText.includes('离我远点')) {
                    characterState.trust = Math.max(0, characterState.trust - 5);
                    characterState.mood = Math.max(0, characterState.mood - 5);
                }
            }
            if (lowerText.includes('过去') || lowerText.includes('以前') || lowerText.includes('仓库') || lowerText.includes('王富贵')) {
                characterState.mood = Math.max(0, characterState.mood - 3);
                characterState.health = Math.max(0, characterState.health - 1);
            }
            characterState.health = Math.max(0, characterState.health - 0.2);
            characterState.health = Math.min(100, Math.max(0, characterState.health));
            characterState.mood = Math.min(100, Math.max(0, characterState.mood));
            characterState.trust = Math.min(100, Math.max(0, characterState.trust));
            updateStatusBars();
        }

        // ========== 预设模型填充 ==========
        document.querySelectorAll('.model-preset').forEach(preset => {
            preset.addEventListener('click', () => {
                apiUrlInput.value = preset.dataset.url;
                apiModelInput.value = preset.dataset.model;
                alert(`已填充 ${preset.textContent} 配置，记得填密钥`);
            });
        });

        // ========== 加载API配置 ==========
        function loadSettings() {
            const settings = localStorage.getItem('apiSettings');
            if (settings) {
                try {
                    const config = JSON.parse(settings);
                    apiUrlInput.value = config.url || '';
                    apiKeyInput.value = config.key || '';
                    apiModelInput.value = config.model || '';
                    userNameInput.value = config.userName || '用户';
                } catch (e) {}
            } else {
                userNameInput.value = '用户';
            }
            // 检查登录状态
            if (token) {
                updateAuthUI(true);
                loadSessions();
            } else {
                updateAuthUI(false);
            }
        }

        // ========== 保存API配置 ==========
        function saveSettings() {
            const config = {
                url: apiUrlInput.value.trim(),
                key: apiKeyInput.value.trim(),
                model: apiModelInput.value.trim(),
                userName: userNameInput.value.trim() || '用户'
            };
            if (!config.url || !config.key || !config.model) {
                alert('请填写API地址、密钥和模型名称');
                return;
            }
            localStorage.setItem('apiSettings', JSON.stringify(config));
            settingsPanel.classList.remove('show');
            alert('API配置已保存！');
        }
        document.getElementById('saveSettings').addEventListener('click', saveSettings);

        function getCurrentConfig() {
            const settings = localStorage.getItem('apiSettings');
            return settings ? JSON.parse(settings) : null;
        }

        function getCurrentUserName() {
            const config = getCurrentConfig();
            return config?.userName || '用户';
        }

        // ========== 聊天界面操作 ==========
        function clearChatArea() {
            chatArea.innerHTML = '';
        }

        // 前端移除消息的函数（不调后端）
        function removeLocalMessage(messageDiv) {
            const messages = Array.from(chatArea.querySelectorAll('.message'));
            const index = messages.indexOf(messageDiv);
            if (index === -1) return;
            messageDiv.remove();
            if (index >= 0 && index < conversationHistory.length) {
                conversationHistory.splice(index, 1);
            }
            if (chatArea.querySelectorAll('.message').length === 0) {
                showOpeningOptions();
            }
        }

        // 删除消息（调用云函数）
        async function deleteMessage(messageDiv) {
            const messageId = messageDiv.dataset.messageId;
            if (!messageId) {
                removeLocalMessage(messageDiv);
                return;
            }

            try {
                const result = await callFunction('deleteMessage', { token, messageId });
                if (result.code === 0) {
                    removeLocalMessage(messageDiv);
                } else {
                    alert('删除失败：' + result.error);
                }
            } catch (err) {
                alert('删除消息失败：' + err.message);
            }
        }

        // 追加消息到界面，并记录 messageId
        function appendMessage(content, sender, messageId) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender === 'user' ? 'user-message' : 'ai-message'}`;
            if (messageId) messageDiv.dataset.messageId = messageId;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            messageDiv.appendChild(bubble);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'message-actions';

            if (sender === 'user') {
                const editBtn = document.createElement('span');
                editBtn.className = 'action-btn edit-btn';
                editBtn.innerHTML = '✏️';
                editBtn.title = '编辑';
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    userInput.value = content;
                    deleteMessage(messageDiv);
                };
                actionsDiv.appendChild(editBtn);
            }

            const deleteBtn = document.createElement('span');
            deleteBtn.className = 'action-btn delete-btn';
            deleteBtn.innerHTML = '🗑️';
            deleteBtn.title = '删除';
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                deleteMessage(messageDiv);
            };
            actionsDiv.appendChild(deleteBtn);

            messageDiv.appendChild(actionsDiv);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addMessageToUI(content, sender, messageId = null) {
            appendMessage(content, sender, messageId);
            const role = sender === 'user' ? 'user' : 'assistant';
            conversationHistory.push({ id: messageId, role: role, content: content });
            updateStateBasedOnMessage(content, sender);
            checkAndSummarize();
        }

        function showOpeningOptions() {
            clearChatArea();
            const container = document.createElement('div');
            container.className = 'opening-buttons';
            OPENING_LINES.forEach((line, index) => {
                const btn = document.createElement('div');
                btn.className = 'opening-btn';
                btn.innerHTML = `<span>${line.emoji}</span> ${line.short}`;
                btn.onclick = () => selectOpening(index);
                container.appendChild(btn);
            });
            chatArea.appendChild(container);
        }

        async function selectOpening(index) {
            const line = OPENING_LINES[index];
            const userName = getCurrentUserName();
            const finalMessage = line.full.replace(/\{\{user(s?)\}\}/gi, userName);
            const msgId = await saveMessageToBackend('assistant', finalMessage);
            addMessageToUI(finalMessage, 'ai', msgId);
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message';
            loadingDiv.id = 'loadingIndicator';
            const loadingBubble = document.createElement('div');
            loadingBubble.className = 'loading-dots';
            loadingBubble.innerHTML = '<span></span><span></span><span></span>';
            loadingDiv.appendChild(loadingBubble);
            chatArea.appendChild(loadingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById('loadingIndicator');
            if (loading) loading.remove();
        }

        // ========== 自动总结功能（不变） ==========
        const SUMMARY_INTERVAL = 40;
        async function checkAndSummarize() {
            const total = conversationHistory.length;
            if (total >= SUMMARY_INTERVAL && (total - lastSummaryIndex) >= SUMMARY_INTERVAL) {
                await generateSummary();
            }
        }

        async function generateSummary() {
            const config = getCurrentConfig();
            if (!config || !config.key) return;
            const total = conversationHistory.length;
            const startIdx = lastSummaryIndex;
            const endIdx = total;
            const messagesToSummarize = conversationHistory.slice(startIdx, endIdx);
            let conversationText = '';
            messagesToSummarize.forEach(msg => {
                const speaker = msg.role === 'user' ? '用户' : 'AI';
                conversationText += `${speaker}: ${msg.content}\n`;
            });
            let summaryPrompt = '';
            if (conversationSummary) {
                summaryPrompt = `现有摘要：\n${conversationSummary}\n\n新增对话：\n${conversationText}\n\n请整合以上信息，生成一个新的摘要，保留所有重要内容，包括角色状态、情感变化、关键事件等。用简洁的中文。`;
            } else {
                summaryPrompt = `请总结以下对话，保留重要信息，包括角色状态、情感变化、关键事件等。用简洁的中文。\n\n${conversationText}`;
            }
            try {
                const response = await fetch(config.url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${config.key}`
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: [
                            { role: 'system', content: '你是一个擅长总结对话的助手。' },
                            { role: 'user', content: summaryPrompt }
                        ],
                        temperature: 0.5,
                        max_tokens: 500
                    })
                });
                if (!response.ok) return;
                const data = await response.json();
                let newSummary = '';
                if (data.choices && data.choices[0].message) {
                    newSummary = data.choices[0].message.content;
                } else if (data.choices && data.choices[0].text) {
                    newSummary = data.choices[0].text;
                } else return;
                conversationSummary = newSummary;
                lastSummaryIndex = total;
                localStorage.setItem('conversationSummary', conversationSummary);
                localStorage.setItem('lastSummaryIndex', lastSummaryIndex);
            } catch (err) {
                console.error('总结失败', err);
            }
        }

        // ========== 发送消息 ==========
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            const config = getCurrentConfig();
            if (!config || !config.key) {
                alert('请先填写API密钥');
                return;
            }
            if (!token || !currentSessionId) {
                alert('请先登录并创建会话');
                return;
            }

            const userMsgId = await saveMessageToBackend('user', message);
            addMessageToUI(message, 'user', userMsgId);
            userInput.value = '';
            showLoading();

            try {
                const userName = getCurrentUserName();
                let systemPromptWithSummary = YOUR_SYSTEM_PROMPT;
                if (conversationSummary) {
                    systemPromptWithSummary += `\n\n【以下是之前的对话摘要】\n${conversationSummary}`;
                }
                systemPromptWithSummary += `\n请称呼用户为“${userName}”。`;

                const messagesForAPI = [
                    { role: 'system', content: systemPromptWithSummary },
                    ...conversationHistory.slice(-10).map(m => ({ role: m.role, content: m.content }))
                ];

                const response = await fetch(config.url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${config.key}`
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: messagesForAPI,
                        temperature: 0.8
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API错误 (${response.status}): ${errorText.substring(0, 100)}`);
                }

                const data = await response.json();
                removeLoading();

                let aiReply = '';
                if (data.choices && data.choices[0].message) {
                    aiReply = data.choices[0].message.content;
                } else if (data.choices && data.choices[0].text) {
                    aiReply = data.choices[0].text;
                } else if (data.output && data.output.text) {
                    aiReply = data.output.text;
                } else {
                    aiReply = '收到回复，但格式未知：' + JSON.stringify(data).substring(0, 200);
                }

                const aiMsgId = await saveMessageToBackend('assistant', aiReply);
                addMessageToUI(aiReply, 'ai', aiMsgId);

            } catch (error) {
                removeLoading();
                addMessageToUI('❌ 出错了：' + error.message, 'ai');
                console.error(error);
            }
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // 初始化状态栏
        updateStatusBars();
    </script>
</body>
</html>
